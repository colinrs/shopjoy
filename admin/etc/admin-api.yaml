Name: admin-api
Host: 0.0.0.0
Port: 8888

# 关闭统计日志
Verbose: false

Log:
  Stat: false
  Level: info

MySQL:
  Host: 192.168.0.100
  Port: 3306
  UserName: root
  Password: "123456"
  Database: shopjoy
  MaxIdleConn: 10
  MaxOpenConn: 100
  ConnMaxLifeTime: 3600

JWT:
  Secret: "ncjancjabjkacam"
  AccessExpiry: 36000000
  RefreshExpiry: 72000000

StripeWebhookSecret: "aaaa"

Telemetry:
  Name: admin-api
  Endpoint: 192.168.0.100:4317
  Sampler: 1.0      # 1.0 = 全量采样
  Batcher: otlpgrpc

Storage:
  Type: local           # local | cloudinary (override per-environment via admin-api-local.yaml)
  Local:
    BasePath: ./uploads
  # Cloudinary block:
  # Cloudinary:
  #   CloudName: ""        # override in admin-api-local.yaml
  #   APIKey: ""           # override in admin-api-local.yaml
  #   APISecret: ""        # override in admin-api-local.yaml (NEVER commit)
  #   UploadPreset: ""
  #   Environment: "dev"
  #   Secure: true